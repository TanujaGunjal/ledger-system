name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build and Test Ledger API
      working-directory: ./ledger-api
      run: ./mvnw clean test

    - name: Build and Test Reconciliation Worker
      working-directory: ./reconciliation-worker
      run: ./mvnw clean test

    - name: Build and Test Fraud Service
      working-directory: ./fraud-service
      run: ./mvnw clean test

    - name: Build Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
